name: New Website Quality Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, fresh-mobile-wisdom-platform]

jobs:
  quality:
    name: Lint, build, and audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --omit=dev --audit-level=moderate
